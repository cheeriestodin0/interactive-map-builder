<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Fragment Builder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background: #111; color: #ddd; }
    #toolbar {
      position: fixed; top: 10px; left: 10px; z-index: 1000;
      background: rgba(0,0,0,0.85); padding: 12px; border-radius: 8px;
      display: flex; gap: 10px; flex-wrap: wrap; max-width: 90vw;
    }
    button, input { padding: 8px 12px; border-radius: 6px; border: none; background: #333; color: white; }
    button:hover { background: #555; }
    #map { height: 100vh; background: #000; }
    .fragment {
      position: absolute; cursor: move; box-shadow: 0 0 15px rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.3); border-radius: 4px;
      transition: box-shadow 0.2s;
    }
    .fragment:hover { box-shadow: 0 0 25px rgba(255,215,0,0.6); }
    .fragment.selected { border-color: gold; box-shadow: 0 0 30px gold; }
  </style>
</head>
<body>
  <div id="toolbar">
    <input type="file" id="uploader" multiple accept="image/*">
    <button id="clear">Clear All</button>
    <button id="export">Export Map (JSON)</button>
    <button id="import">Import Map</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <span style="margin-left:10px; opacity:0.7;">Drag fragments • Scroll to zoom • Alt+drag to rotate</span>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
